target-version = "py311"
line-length = 88
src = ["src"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # `isort`
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "ANN", # flake8-annotations
    "RUF", # ruff-specific rules
]
ignore = [
    "ANN101", # missing type for self
    "ANN102", # missing type for cls
    "ANN401", # Any allowed where needed
    "B008",   # FastAPI Depends() in defaults is intentional
]

[lint.isort]
known-first-party = ["src"]
force-single-line = false

[lint.per-file-ignores]
"src/data/models/**" = ["N815", "RUF012"]
"src/schemas/**"     = ["ANN"]
"src/**/__init__.py" = ["N999"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"